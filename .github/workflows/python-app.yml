name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_food_delivery
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Create database tables
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_food_delivery
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        DEBUG: True
      run: |
        python -c "
        from app.core.database import Base, engine
        Base.metadata.create_all(bind=engine)
        print('Tables created.')
        "
    
    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_food_delivery
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        DEBUG: True
      run: |
        python -m pytest app/tests/ -v --cov=app --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
    
    - name: Check code formatting with black
      run: |
        black --check app/
    
    - name: Lint with flake8
      run: |
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get Diff
        id: git_diff
        run: |
          git config --global --add safe.directory /github/workspace
          echo "--- Diff Preview ---"
          head -n 5 diff.txt
          echo "--------------------"
          
          echo "Captured diff size: $(stat -c%s diff.txt) bytes"
          
          if [ -s diff.txt ]; then
            echo "DIFF_EXIST=true" >> $GITHUB_ENV
          else
            echo "DIFF_EXIST=false" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate AI Summary
        env:
          LLM7_API_KEY: ${{ secrets.SECRET_KEY }}
        shell: python
        run: |
          import os
          from openai import OpenAI

          client = OpenAI(
              api_key=os.getenv("LLM7_API_KEY") or "unused",
              base_url="https://api.llm7.io/v1"
          )

          try:
              if not os.path.exists("diff.txt") or os.path.getsize("diff.txt") == 0:
                  summary = "⚠️ Diff пуст. Возможно, изменений в коде нет или произошла ошибка при получении diff."
              else:
                  with open("diff.txt", "r", encoding="utf-8") as f:
                      diff_content = f.read()
                  
                  truncated_diff = diff_content[:15000]

                  prompt = f"""Ты — профессиональный техлид. Проанализируй изменения в коде (diff) и напиши краткое резюме для Pull Request на русском языке.
          Используй формат:
          - **Что сделано:** (список ключевых изменений)
          - **На что обратить внимание:** (возможные риски или важные правки)

          Вот текст diff:
          {truncated_diff}"""

                  response = client.chat.completions.create(
                      model="default",
                      messages=[{"role": "user", "content": prompt}],
                      temperature=0.2
                  )
                  summary = response.choices[0].message.content
          except Exception as e:
              summary = f"⚠️ Ошибка при генерации описания: {str(e)}"

          with open("summary.txt", "w", encoding="utf-8") as f:
              f.write(summary)

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: summary.txt